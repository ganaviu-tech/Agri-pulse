<!DOCTYPE html>
<html>
<head>
    <title>AgriPulse | Professional Soil Analytics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#fcfaf5;
            font-family:Poppins, sans-serif;
        }

        .hero{
            background:linear-gradient(135deg,#1b3022,#2d5a27);
            color:white;
            padding:60px;
            text-align:center;
        }

        .card{
            border-radius:15px;
            box-shadow:0 10px 20px rgba(0,0,0,0.08);
        }

        .btn-primary{
            background:#2d5a27;
            border:none;
        }

        .btn-primary:hover{
            background:#1b3022;
        }

    </style>

</head>

<body>

<div class="hero">
    <h1>🌾 AgriPulse AI Dashboard</h1>
    <p>Precision Soil Analytics for Smarter Farming 🚜</p>
</div>


<div class="container mt-5">

<div class="row">

<!-- MANUAL ENTRY -->
<div class="col-md-6">

<div class="card p-4">

<h3 class="text-success mb-4">Manual Soil Entry</h3>

<form action="/analyze_manual" method="post">

<div class="mb-3">
<label class="form-label">Select Crop</label>

<select name="crop" class="form-select">

<option value="Tomato">🍅 Tomato</option>
<option value="Wheat">🌾 Wheat</option>
<option value="Rice">🍚 Rice</option>
<option value="Maize">🌽 Maize</option>

</select>
</div>


<div class="row">

<div class="col-4">
<label>N</label>
<input type="number" name="N" class="form-control" required>
</div>

<div class="col-4">
<label>P</label>
<input type="number" name="P" class="form-control" required>
</div>

<div class="col-4">
<label>K</label>
<input type="number" name="K" class="form-control" required>
</div>

</div>


<div class="mt-3">

<label>pH Level</label>

<input type="number" step="0.1" name="pH" class="form-control" required>

</div>


<button class="btn btn-primary w-100 mt-4">
Analyze Soil
</button>

</form>

</div>
</div>



<!-- CSV UPLOAD -->

<div class="col-md-6">

<div class="card p-4">

<h3 class="text-warning mb-4">Bulk CSV Upload</h3>

<form action="/" method="post" enctype="multipart/form-data">

<div class="mb-3">

<label>Select Target Crop</label>

<select name="crop" class="form-select">

<option value="Tomato">🍅 Tomato</option>
<option value="Wheat">🌾 Wheat</option>
<option value="Rice">🍚 Rice</option>
<option value="Maize">🌽 Maize</option>

</select>

</div>


<div class="mb-3">

<label>Upload CSV File</label>

<input type="file" name="file" class="form-control" required>

</div>


<button class="btn btn-dark w-100">

Process Dataset

</button>

</form>

</div>

</div>

</div>

</div>


<footer class="text-center mt-5 mb-4 text-muted">

Built for Sustainable Farming 🌍

</footer>

</body>
</html>
